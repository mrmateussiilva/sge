services:
  sge:
    build: .
    expose:
      - "8000"        # acessível internamente na rede Docker, não exposto ao host
    env_file: .env
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    networks:
      - caddy_net

volumes:
  sqlite_data:

networks:
  caddy_net:
    external: true    # rede criada manualmente: docker network create caddy_net
