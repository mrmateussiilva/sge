{% extends 'estoque/base.html' %}
{% block title %}S.G.E - Novo Produto{% endblock %}

{% block content %}
<h1 class="mb-4 fw-bold"><i class="bi bi-plus-circle me-2"></i>Novo Produto</h1>

<div id="app">
  <div class="card shadow-sm border-0 rounded-3">
    <div class="card-body p-4">
      <form @submit.prevent="enviar" class="row g-3">

        <div class="col-12">
          <label class="form-label fw-medium small text-uppercase text-secondary">Tipo de Insumo</label>
          <select class="form-select form-select-lg" v-model="produto.tipo_produto" required @change="focarDescricao">
            <option value="" disabled>Selecione o tipo de insumo...</option>
            <option value="TECIDO">Tecido</option>
            <option value="PAPEL">Papel</option>
            <option value="TINTA">Tinta</option>
            <option value="AVIAMENTO">Aviamento</option>
            <option value="OUTRO">Outro</option>
          </select>
        </div>

        <template v-if="produto.tipo_produto !== ''">
          <div class="col-12">
            <label class="form-label fw-medium small text-uppercase text-secondary">Descrição</label>
            <input ref="descricao" type="text" class="form-control form-control-lg" v-model="produto.descricao" placeholder="Ex: Papel Vinil Adesivo Branco" required>
          </div>

          <div class="col-md-3">
            <label class="form-label fw-medium small text-uppercase text-secondary">Quantidade Inicial</label>
            <input type="text" inputmode="decimal" class="form-control" :value="produto.quantidade_base" @input="filterDecimal('quantidade_base', $event)" placeholder="0,00">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-medium small text-uppercase text-secondary">Unid. Medida</label>
            <select class="form-select" v-model="produto.unidade_medida">
              <option value="UN">Unidade (un)</option>
              <option value="M">Metros (m)</option>
              <option value="KG">Quilogramas (kg)</option>
              <option value="L">Litros (L)</option>
              <option value="RL">Rolo (rl)</option>
              <option value="CX">Caixa (cx)</option>
              <option value="PC">Peça (pc)</option>
              <option value="G">Gramas (g)</option>
              <option value="ML">Mililitros (ml)</option>
              <option value="OUTRO">Outro</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label fw-medium small text-uppercase text-secondary">Est. Mínimo</label>
            <input type="text" inputmode="decimal" class="form-control" :value="produto.estoque_minimo" @input="filterDecimal('estoque_minimo', $event)" placeholder="0,00">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-medium small text-uppercase text-secondary">Fornecedor</label>
            <select class="form-select" v-model="produto.fornecedor_id">
              <option value="">—</option>
              <option v-for="f in fornecedores" :key="f.id" :value="f.id">[[ f.nome ]]</option>
            </select>
          </div>
          <div class="col-12 mt-2">
            <button class="btn btn-outline-secondary w-100" type="button" data-bs-toggle="collapse" data-bs-target="#camposAvancados">
              <i class="bi bi-sliders me-1"></i>Campos avançados
            </button>
          </div>

          <div class="collapse col-12" id="camposAvancados">
            <div class="row g-3 mt-1">
          <div class="col-md-4">
            <label class="form-label fw-medium small text-uppercase text-secondary">Categoria</label>
            <select class="form-select" v-model="produto.categoria_id">
              <option value="">— Sem Categoria —</option>
              <option v-for="c in categorias" :key="c.id" :value="c.id">[[ c.nome ]]</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label fw-medium small text-uppercase text-secondary">Preço de Custo</label>
            <div class="input-group">
              <span class="input-group-text">R$</span>
              <input type="text" inputmode="decimal" class="form-control" :value="produto.preco_custo" @input="filterDecimal('preco_custo', $event)" placeholder="0,00">
            </div>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-medium small text-uppercase text-secondary">Preço de Venda</label>
            <div class="input-group">
              <span class="input-group-text">R$</span>
              <input type="text" inputmode="decimal" class="form-control" :value="produto.preco_venda" @input="filterDecimal('preco_venda', $event)" placeholder="0,00">
            </div>
          </div>

          <!-- Painel Dinâmico de Margens e Simulador de Markup -->
          <div class="col-12" v-if="produto.preco_custo || produto.preco_venda">
            <div class="p-3 rounded-3 d-flex flex-wrap gap-4 align-items-center justify-content-between" style="background-color: rgba(99, 102, 241, 0.05); border: 1px dashed rgba(99, 102, 241, 0.25);">
              <div class="d-flex gap-4 flex-wrap">
                <div>
                  <small class="text-muted d-block fw-semibold small text-uppercase" style="font-size: 0.72rem;">Lucro Estimado</small>
                  <strong :class="lucroBrutoNum >= 0 ? 'text-success' : 'text-danger'" class="fs-5">
                    R$ [[ formatDinheiro(lucroBrutoNum) ]]
                  </strong>
                </div>
                <div>
                  <small class="text-muted d-block fw-semibold small text-uppercase" style="font-size: 0.72rem;">Margem de Lucro (Markup)</small>
                  <strong :class="markupPercent >= 0 ? 'text-success' : 'text-danger'" class="fs-5">
                    [[ formatPorcentagem(markupPercent) ]]%
                  </strong>
                </div>
              </div>
              <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="small text-muted fw-medium">Simular Markup:</span>
                <div class="input-group input-group-sm markup-input">
                  <input type="number" class="form-control" v-model.number="simuladorMarkup" @input="calcularVendaPorMarkup" placeholder="Ex: 50">
                  <span class="input-group-text bg-white">%</span>
                </div>
              </div>
            </div>
          </div>

          <template v-if="produto.tipo_produto === 'TINTA'">
            <div class="col-md-4">
              <label class="form-label fw-medium small text-uppercase text-secondary">Tipo de Tinta</label>
              <select class="form-select" v-model="produto.tipo_tinta">
                <option value="SUBLIMACAO">Sublimação</option>
                <option value="SOLVENTE">Solvente</option>
                <option value="N/A">Não se aplica</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-medium small text-uppercase text-secondary">Cor</label>
              <select class="form-select" v-model="produto.cor_tinta">
                <option value="CYAN">Cyan</option>
                <option value="MAGENTA">Magenta</option>
                <option value="YELLOW">Yellow</option>
                <option value="BLACK">Black (Preto)</option>
                <option value="LIGHT_CYAN">Light Cyan</option>
                <option value="LIGHT_MAGENTA">Light Magenta</option>
                <option value="BRANCO">Branco</option>
                <option value="INCOLOR">Incolor/N/A</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-medium small text-uppercase text-secondary">Litros / Vidro</label>
              <input type="text" inputmode="decimal" class="form-control" :value="produto.litros_por_vidro" @input="filterDecimal('litros_por_vidro', $event)" placeholder="Ex: 3,6">
            </div>
          </template>

          <template v-if="produto.tipo_produto === 'TECIDO' || produto.tipo_produto === 'PAPEL'">
            <div class="col-md-4">
              <label class="form-label fw-medium small text-uppercase text-secondary">Metros / Rolo</label>
              <input type="text" inputmode="decimal" class="form-control" :value="produto.metros_por_rolo" @input="filterDecimal('metros_por_rolo', $event)" placeholder="Ex: 50">
            </div>
          </template>
            </div>
          </div>

          <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm w-100" :disabled="carregando">
              <i class="bi bi-check-lg me-2"></i>[[ carregando ? 'Salvando...' : 'Cadastrar Produto' ]]
            </button>
          </div>
        </template>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const { createApp } = Vue;
  const csrfToken = '{{ csrf_token }}';
  const app = createApp({
    compilerOptions: {
      delimiters: ['[[', ']]']
    },
    data() {
      return {
        fornecedores: {{ fornecedores|safe }},
        categorias: {{ categorias|safe }},
        produto: {
          tipo_produto: '',
          unidade_medida: 'UN',
          descricao: '',
          fornecedor_id: '',
          categoria_id: '',
          quantidade_base: '',
          preco_custo: '',
          preco_venda: '',
          estoque_minimo: '',
          metros_por_rolo: null,
          tipo_tinta: 'N/A',
          cor_tinta: 'INCOLOR',
          litros_por_vidro: null,
        },
        simuladorMarkup: '',
        carregando: false,
      };
    },
    computed: {
      precoCustoNum() {
        return this.toNumber(this.produto.preco_custo);
      },
      precoVendaNum() {
        return this.toNumber(this.produto.preco_venda);
      },
      lucroBrutoNum() {
        return this.precoVendaNum - this.precoCustoNum;
      },
      markupPercent() {
        if (this.precoCustoNum <= 0) return 0;
        return (this.lucroBrutoNum / this.precoCustoNum) * 100;
      }
    },
    watch: {
      'produto.tipo_produto': function (novoTipo) {
        if (novoTipo === 'TECIDO' || novoTipo === 'PAPEL') {
          this.produto.unidade_medida = 'M';
        } else if (novoTipo === 'TINTA') {
          this.produto.unidade_medida = 'L';
        } else {
          this.produto.unidade_medida = 'UN';
        }
        if (novoTipo !== 'TINTA') {
          this.produto.tipo_tinta = 'N/A';
          this.produto.cor_tinta = 'INCOLOR';
          this.produto.litros_por_vidro = null;
        }
        if (novoTipo !== 'TECIDO' && novoTipo !== 'PAPEL') {
          this.produto.metros_por_rolo = null;
        }
      },
    },
    methods: {
      focarDescricao() {
        this.$nextTick(() => this.$refs.descricao?.focus());
      },
      formatDinheiro(val) {
        return val.toFixed(2).replace('.', ',');
      },
      formatPorcentagem(val) {
        return val.toFixed(1).replace('.', ',');
      },
      calcularVendaPorMarkup() {
        const markup = parseFloat(this.simuladorMarkup);
        if (isNaN(markup) || markup < 0) return;
        const custo = this.precoCustoNum;
        if (custo <= 0) return;
        const venda = custo * (1 + (markup / 100));
        let formatted = venda.toFixed(2).replace('.', ',');
        formatted = formatted.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        this.produto.preco_venda = formatted;
      },
      filterDecimal(field, event) {
        let val = event.target.value.replace(/\D/g, '');
        if (!val) {
          this.produto[field] = '';
          event.target.value = '';
          return;
        }
        let num = (parseInt(val, 10) / 100).toFixed(2);
        let formatted = num.replace('.', ',');
        formatted = formatted.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        this.produto[field] = formatted;
        event.target.value = formatted;
        
        // Se mudou o preço de custo, recalcula a venda caso o simulador de markup esteja preenchido
        if (field === 'preco_custo' && this.simuladorMarkup !== '') {
          this.$nextTick(() => this.calcularVendaPorMarkup());
        }
      },
      toNumber(raw) {
        if (raw === '' || raw === null || raw === undefined) return 0;
        const str = String(raw).replace(/\./g, '').replace(',', '.').replace(/[^0-9.\-]/g, '');
        const num = parseFloat(str);
        return isNaN(num) ? 0 : num;
      },
      async enviar() {
        if (!this.produto.tipo_produto) {
          showToast('Selecione o tipo de insumo.', 'warning');
          return;
        }
        const p = this.produto;
        p.quantidade_base = this.toNumber(p.quantidade_base);
        p.preco_custo = this.toNumber(p.preco_custo);
        p.preco_venda = this.toNumber(p.preco_venda);
        p.estoque_minimo = this.toNumber(p.estoque_minimo);
        if (p.metros_por_rolo !== null) p.metros_por_rolo = this.toNumber(p.metros_por_rolo);
        if (p.litros_por_vidro !== null) p.litros_por_vidro = this.toNumber(p.litros_por_vidro);
        this.carregando = true;
        try {
          const resp = await fetch('/cadastrar-produto/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify(p),
          });
          const data = await resp.json();
          if (data.ok) {
            showToast('Produto cadastrado com sucesso!');
            this.produto = {
              tipo_produto: '',
              descricao: '',
              fornecedor_id: '',
              categoria_id: '',
              quantidade_base: 0,
              preco_custo: 0,
              preco_venda: 0,
              estoque_minimo: 0,
              metros_por_rolo: null,
              tipo_tinta: 'N/A',
              cor_tinta: 'INCOLOR',
              litros_por_vidro: null,
            };
          } else {
            showToast('Erro ao cadastrar produto.', 'danger');
          }
        } catch {
          showToast('Erro de conexão.', 'danger');
        } finally {
          this.carregando = false;
        }
      },
    },
  });
  app.mount('#app');
})();
</script>
{% endblock %}
