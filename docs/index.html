<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGE | Gestão de Estoque</title>
    <script>
      document.documentElement.classList.add("auth-pending");
      const sidebarState = localStorage.getItem("sge-sidebar");
      if (sidebarState === "collapsed") {
        document.documentElement.classList.add("sidebar-collapsed");
      }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar bg-white border-end d-flex flex-column" id="appSidebar">
        <!-- Brand -->
        <div class="sidebar-brand px-3 py-4 d-flex align-items-center gap-2">
          <div class="brand-logo text-primary fs-3"><i class="bi bi-box-seam-fill"></i></div>
          <div class="brand-text d-flex flex-column">
            <span class="fw-bold fs-5 lh-1 text-dark">SGE</span>
            <small class="text-secondary" style="font-size: 0.75rem;">v1.0.0</small>
          </div>
        </div>
        
        <!-- Navigation -->
        <nav class="sidebar-nav flex-grow-1 px-3 d-flex flex-column gap-4 mt-2">
          <div class="nav-section">
            <small class="section-label text-muted fw-bold mb-2 d-block">OPERACIONAL</small>
            <div class="nav-links d-flex flex-column gap-1">
              <a href="#/dashboard" class="nav-item rounded-3" data-route="/dashboard">
                <i class="bi bi-grid-1x2"></i>
                <span class="nav-label">Dashboard</span>
              </a>
              <a href="#/produtos" class="nav-item rounded-3" data-route="/produtos">
                <i class="bi bi-box-seam"></i>
                <span class="nav-label">Produtos</span>
              </a>
              <a href="#/movimentacoes" class="nav-item rounded-3" data-route="/movimentacoes">
                <i class="bi bi-arrow-left-right"></i>
                <span class="nav-label">Movimentações</span>
              </a>
            </div>
          </div>
          
          <div class="nav-section mt-auto mb-4">
            <small class="section-label text-muted fw-bold mb-2 d-block">GESTÃO</small>
            <div class="nav-links d-flex flex-column gap-1">
              <div class="nav-item-user px-3 py-2 d-flex align-items-center gap-2 mb-2">
                 <div class="user-avatar text-primary bg-primary-subtle rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width:32px;height:32px;">
                   <i class="bi bi-person-fill"></i>
                 </div>
                 <div class="user-info transition-fade">
                   <span class="d-block fw-semibold text-dark lh-1" data-usuario-nome>Carregando...</span>
                   <small class="text-secondary" style="font-size: 0.70rem;">Usuário logado</small>
                 </div>
              </div>
              <button class="nav-item rounded-3 w-100 border-0 bg-transparent text-start" data-logout>
                <i class="bi bi-box-arrow-right text-danger"></i>
                <span class="nav-label text-danger">Sair</span>
              </button>
            </div>
          </div>
        </nav>
        
        <!-- Footer / Toggle -->
        <div class="sidebar-footer p-3 border-top">
          <button class="btn btn-light w-100 d-flex align-items-center justify-content-center gap-2" id="sidebarToggle">
            <i class="bi bi-chevron-bar-left transition-icon fs-5 lh-1"></i>
            <span class="nav-label">Recolher</span>
          </button>
        </div>
      </aside>

      <!-- Main Content Container -->
      <main class="main-wrapper flex-grow-1 d-flex flex-column h-100 overflow-y-auto pb-5">
        <div id="app-content" class="flex-grow-1 p-4 d-flex flex-column gap-4">
           <!-- Dynamic SPa Views will be injected here -->
        </div>
      </main>
    </div>

    <!-- Modals Host -->
    <div id="app-modals"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/produtos.js"></script>
    <script src="js/views/movimentacoes.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
