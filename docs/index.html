<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGE | Gestão Interna</title>
  <script>
    document.documentElement.classList.add("auth-pending");
    const sidebarState = localStorage.getItem("sge-sidebar");
    if (sidebarState === "collapsed") {
      document.documentElement.classList.add("sidebar-collapsed");
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app-layout">
    <!-- Side overlay for mobile -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar border-end d-flex flex-column shadow-sm" id="appSidebar">
      <!-- Brand -->
      <div class="sidebar-brand px-3 py-3 d-flex align-items-center gap-3 border-bottom border-light">
        <div
          class="brand-logo text-primary bg-primary-subtle rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
          style="width: 32px; height: 32px;">
          <i class="bi bi-box-seam-fill fs-6"></i>
        </div>
        <div class="brand-text d-flex flex-column flex-grow-1 min-vw-0">
          <span class="fw-bold fs-6 lh-1 text-dark text-truncate">SGE</span>
          <small class="text-secondary" style="font-size: 0.65rem;">Enterprise v1.0</small>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="sidebar-nav flex-grow-1 px-3 d-flex flex-column gap-3 mt-3 pb-4 overflow-y-auto"
        style="scrollbar-width: thin;">
        <div class="nav-section">
          <small class="section-label text-muted fw-bold mb-1 d-block px-1 text-uppercase">Operacional</small>
          <div class="nav-links d-flex flex-column gap-1">
            <a href="#/dashboard" class="nav-item" data-route="/dashboard" title="Dashboard">
              <i class="bi bi-grid-1x2"></i>
              <span class="nav-label">Dashboard</span>
            </a>
            <a href="#/produtos" class="nav-item" data-route="/produtos" title="Produtos">
              <i class="bi bi-box-seam"></i>
              <span class="nav-label">Produtos</span>
            </a>
            <a href="#/movimentacoes" class="nav-item" data-route="/movimentacoes" title="Movimentações">
              <i class="bi bi-arrow-left-right"></i>
              <span class="nav-label">Movimentações</span>
            </a>
          </div>
        </div>

        <div class="nav-section mt-auto">
          <small class="section-label text-muted fw-bold mb-1 d-block px-1 text-uppercase">Gestão</small>
          <div class="nav-links d-flex flex-column gap-1">
            <div
              class="nav-item-user px-2 py-2 mb-1 d-flex align-items-center gap-2 rounded-3 bg-light border border-light-subtle">
              <div
                class="user-avatar text-primary bg-white border rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                style="width: 28px; height: 28px;">
                <i class="bi bi-person-fill"></i>
              </div>
              <div class="user-info transition-fade flex-grow-1 min-vw-0">
                <span class="d-block fw-bold text-dark lh-1 text-truncate" style="font-size: 0.75rem;"
                  data-usuario-nome>Carregando...</span>
                <small class="text-muted d-block text-truncate" style="font-size: 0.65rem;">Sessão Ativa</small>
              </div>
            </div>
            <button class="nav-item w-100 border-0 bg-transparent text-start text-danger" title="Encerrar sessão segura"
              data-logout>
              <i class="bi bi-door-open"></i>
              <span class="nav-label">Desconectar</span>
            </button>
          </div>
        </div>
      </nav>

      <!-- Footer / Toggle -->
      <div class="sidebar-footer p-2 border-top">
        <button
          class="btn btn-light border w-100 d-flex align-items-center gap-2 px-3 text-secondary justify-content-center"
          id="sidebarToggle" title="Recolher menu lateral" aria-label="Recolher">
          <i class="bi bi-chevron-bar-left transition-icon fs-6"></i>
          <span class="nav-label fw-medium w-100 text-start" style="font-size:0.8rem">Recolher</span>
        </button>
      </div>
    </aside>

    <!-- Main Content Container -->
    <main class="main-wrapper flex-grow-1 d-flex flex-column h-100 position-relative">

      <!-- Minimal Mobile Topbar (only visible on mobile) -->
      <div
        class="d-lg-none d-flex align-items-center px-3 py-2 border-bottom bg-white shadow-sm w-100 position-sticky top-0 z-3">
        <button class="btn btn-light border btn-icon me-2" id="mobileMenuBtn" aria-label="Abrir Menu">
          <i class="bi bi-list fs-5 lh-1"></i>
        </button>
        <span class="fw-bold text-dark fs-6 lh-1">SGE</span>
      </div>

      <div class="container-fluid flex-grow-1 px-4 pt-2 d-flex flex-column gap-3 overflow-y-auto"
        style="max-width: 1280px; width: 100%; margin: 0 auto; padding-bottom: 2rem !important;">
        <div id="app-content" class="w-100 h-100">
          <!-- Dynamic SPa Views will be injected here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Toasts Container -->
  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1060"></div>

  <!-- Modals Host -->
  <div id="app-modals"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/produtos.js"></script>
  <script src="js/views/movimentacoes.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script>
    const overlay = document.getElementById('mobileOverlay');
    const mobileBtn = document.getElementById('mobileMenuBtn');
    if (mobileBtn && overlay) {
      mobileBtn.addEventListener('click', () => {
        document.documentElement.classList.add('sidebar-mobile-open');
      });
      overlay.addEventListener('click', () => {
        document.documentElement.classList.remove('sidebar-mobile-open');
      });
      document.querySelectorAll('.nav-item').forEach(l => l.addEventListener('click', () => document.documentElement.classList.remove('sidebar-mobile-open')));
    }
  </script>
</body>

</html>
