<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGE | Produtos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div>
          <div class="brand">SGE</div>
          <div class="brand-subtitle">Sistema de Estoque</div>
        </div>
        <nav class="nav flex-column gap-2 mt-4">
          <a class="nav-link" href="index.html">Dashboard</a>
          <a class="nav-link active" href="produtos.html">Produtos</a>
          <a class="nav-link" href="movimentacoes.html">Movimentacoes</a>
        </nav>
      </aside>

      <main class="content">
        <div class="page-header">
          <div>
            <h1 class="page-title">Produtos</h1>
            <p class="page-subtitle">Cadastro e acompanhamento dos itens em estoque.</p>
          </div>
          <button class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#produtoModal">
            Adicionar produto
          </button>
        </div>

        <section class="card shadow-soft">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table align-middle mb-0">
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>SKU</th>
                    <th>Estoque</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="produtosTabela">
                  <tr>
                    <td colspan="4" class="text-center text-secondary py-4">Carregando produtos...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="modal fade" id="produtoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header">
            <div>
              <h5 class="modal-title">Novo produto</h5>
              <p class="text-secondary mb-0">Preencha os dados principais do item.</p>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="produtoForm" class="row g-3">
              <div class="col-md-6">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" required />
              </div>
              <div class="col-md-6">
                <label for="sku" class="form-label">SKU</label>
                <input type="text" class="form-control" id="sku" required />
              </div>
              <div class="col-md-4">
                <label for="categoria" class="form-label">Categoria</label>
                <input type="text" class="form-control" id="categoria" />
              </div>
              <div class="col-md-4">
                <label for="unidade" class="form-label">Unidade</label>
                <input type="text" class="form-control" id="unidade" placeholder="un, cx, kg" required />
              </div>
              <div class="col-md-4">
                <label for="localizacao" class="form-label">Localizacao</label>
                <input type="text" class="form-control" id="localizacao" />
              </div>
              <div class="col-md-3">
                <label for="custo" class="form-label">Custo</label>
                <input type="number" step="0.01" min="0" class="form-control" id="custo" required />
              </div>
              <div class="col-md-3">
                <label for="preco" class="form-label">Preco</label>
                <input type="number" step="0.01" min="0" class="form-control" id="preco" required />
              </div>
              <div class="col-md-3">
                <label for="estoque_atual" class="form-label">Estoque atual</label>
                <input type="number" min="0" class="form-control" id="estoque_atual" required />
              </div>
              <div class="col-md-3">
                <label for="estoque_minimo" class="form-label">Estoque minimo</label>
                <input type="number" min="0" class="form-control" id="estoque_minimo" required />
              </div>
              <div class="col-12">
                <div id="produtoErro" class="alert alert-danger d-none mb-0" role="alert"></div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="produtoForm" class="btn btn-primary">Salvar produto</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
      const produtosTabela = document.getElementById("produtosTabela");
      const produtoForm = document.getElementById("produtoForm");
      const produtoErro = document.getElementById("produtoErro");
      const produtoModal = new bootstrap.Modal(document.getElementById("produtoModal"));

      function statusBadge(produto) {
        const baixo = produto.estoque_atual <= produto.estoque_minimo;
        return baixo
          ? '<span class="badge rounded-pill bg-warning-subtle text-warning-emphasis">Estoque baixo</span>'
          : '<span class="badge rounded-pill bg-success-subtle text-success-emphasis">Regular</span>';
      }

      async function carregarProdutos() {
        try {
          const produtos = await api.getProdutos();

          if (!produtos.length) {
            produtosTabela.innerHTML =
              '<tr><td colspan="4" class="text-center text-secondary py-4">Nenhum produto cadastrado.</td></tr>';
            return;
          }

          produtosTabela.innerHTML = produtos
            .map(
              (produto) => `
                <tr>
                  <td>
                    <div class="fw-semibold">${produto.nome}</div>
                    <small class="text-secondary">${produto.categoria || "Sem categoria"}</small>
                  </td>
                  <td>${produto.sku}</td>
                  <td>${produto.estoque_atual} ${produto.unidade}</td>
                  <td>${statusBadge(produto)}</td>
                </tr>
              `,
            )
            .join("");
        } catch (error) {
          produtosTabela.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">${error.message}</td></tr>`;
        }
      }

      produtoForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        produtoErro.classList.add("d-none");

        const payload = {
          nome: document.getElementById("nome").value.trim(),
          sku: document.getElementById("sku").value.trim(),
          categoria: document.getElementById("categoria").value.trim() || null,
          unidade: document.getElementById("unidade").value.trim(),
          custo: Number(document.getElementById("custo").value),
          preco: Number(document.getElementById("preco").value),
          estoque_atual: Number(document.getElementById("estoque_atual").value),
          estoque_minimo: Number(document.getElementById("estoque_minimo").value),
          localizacao: document.getElementById("localizacao").value.trim() || null,
        };

        try {
          await api.createProduto(payload);
          produtoForm.reset();
          produtoModal.hide();
          carregarProdutos();
        } catch (error) {
          produtoErro.textContent = error.message;
          produtoErro.classList.remove("d-none");
        }
      });

      carregarProdutos();
    </script>
  </body>
</html>
