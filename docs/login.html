<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SGE | Acesso Restrito</title>
  <script>
    document.documentElement.classList.add("auth-pending");
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="login-page">
  <main class="login-box card-enterprise d-flex flex-column">
    <header class="text-center mb-4">
      <div class="d-inline-flex justify-content-center align-items-center text-primary bg-primary-subtle rounded-4 mb-3"
        style="width:64px;height:64px;">
        <i class="bi bi-box-seam-fill fs-2"></i>
      </div>
      <h1 class="fw-bold fs-4 text-dark mb-1">Acesso ao SGE</h1>
      <p class="text-secondary" style="font-size: 0.85rem;">Sistema interno de gestão de estoque.</p>
    </header>

    <form id="loginForm" class="d-flex flex-column gap-3">
      <div>
        <label for="email" class="form-label form-label-sm">Email corporativo</label>
        <input type="email" class="form-control" id="email" placeholder="operador@local" required />
      </div>
      <div>
        <label for="senha" class="form-label form-label-sm d-flex justify-content-between">
          <span>Senha</span>
        </label>
        <input type="password" class="form-control" id="senha" placeholder="Sua senha de acesso" required />
      </div>

      <div id="loginErro" class="alert alert-danger py-2 px-3 d-none mb-0 rounded-3 mt-1" style="font-size: 0.8rem;"
        role="alert"></div>

      <button type="submit" class="btn btn-primary w-100 py-2 mt-2" id="loginButton">
        <span class="login-button-text">Fazer Login</span>
      </button>
    </form>
  </main>

  <script src="js/auth.js"></script>
  <script>
    redirecionarSeAutenticado();

    const loginForm = document.getElementById("loginForm");
    const loginErro = document.getElementById("loginErro");
    const loginButton = document.getElementById("loginButton");

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginErro.classList.add("d-none");
      loginButton.disabled = true;
      loginButton.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Autenticando...';

      try {
        await login(
          document.getElementById("email").value.trim(),
          document.getElementById("senha").value,
        );
        window.location.replace("index.html");
      } catch (error) {
        loginErro.textContent = error.message;
        loginErro.classList.remove("d-none");
      } finally {
        loginButton.disabled = false;
        loginButton.innerHTML = '<span class="login-button-text">Fazer Login</span>';
      }
    });
  </script>
</body>

</html>
