<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGE | Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card">
        <div class="login-brand">
          <div class="login-brand-icon">
            <i class="bi bi-box-seam"></i>
          </div>
          <div>
            <h1 class="login-title">Sistema de Estoque</h1>
            <p class="login-subtitle">Acesso interno para operadores e administradores.</p>
          </div>
        </div>

        <form id="loginForm" class="row g-3 mt-1">
          <div class="col-12">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="operador@empresa.com"
              required
            />
          </div>

          <div class="col-12">
            <label for="senha" class="form-label">Senha</label>
            <input
              type="password"
              class="form-control"
              id="senha"
              placeholder="Digite sua senha"
              required
            />
          </div>

          <div class="col-12">
            <div id="loginErro" class="alert alert-danger py-2 px-3 d-none mb-0" role="alert"></div>
          </div>

          <div class="col-12 d-grid">
            <button type="submit" class="btn btn-primary" id="loginButton">
              <span class="login-button-text">Entrar</span>
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="js/auth.js"></script>
    <script>
      redirecionarSeAutenticado();

      const loginForm = document.getElementById("loginForm");
      const loginErro = document.getElementById("loginErro");
      const loginButton = document.getElementById("loginButton");

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginErro.classList.add("d-none");
        loginButton.disabled = true;
        loginButton.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';

        try {
          await login(
            document.getElementById("email").value.trim(),
            document.getElementById("senha").value,
          );
          window.location.href = "index.html";
        } catch (error) {
          loginErro.textContent = error.message;
          loginErro.classList.remove("d-none");
        } finally {
          loginButton.disabled = false;
          loginButton.innerHTML = '<span class="login-button-text">Entrar</span>';
        }
      });
    </script>
  </body>
</html>
